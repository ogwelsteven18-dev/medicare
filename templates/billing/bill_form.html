{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-7">
<div class="card"><div class="card-header"><i class="bi bi-receipt me-2"></i>{{ title }}</div>
<div class="card-body p-4">
<form method="post">{% csrf_token %}
<div class="row g-3">
  <div class="col-12"><label class="form-label">Patient *</label>{{ form.patient }}</div>
  <div class="col-md-6"><label class="form-label">Due Date</label>{{ form.due_date }}</div>
  <div class="col-md-3"><label class="form-label">Discount (UGX)</label>{{ form.discount }}</div>
  <div class="col-md-3"><label class="form-label">Tax (UGX)</label>{{ form.tax }}</div>
  <div class="col-12"><label class="form-label">Notes</label>{{ form.notes }}</div>
  <div class="col-12"><button type="submit" class="btn btn-primary me-2">Create Bill</button><a href="{% url 'billing:bill_list' %}" class="btn btn-outline-secondary">Cancel</a></div>
</div>
</form>
</div></div>
</div></div>
{% endblock %}

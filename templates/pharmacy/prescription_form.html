{% extends 'base.html' %}
{% block title %}New Prescription{% endblock %}
{% block page_title %}New Prescription{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-9">
<div class="card"><div class="card-header"><i class="bi bi-file-medical me-2"></i>Create Prescription</div>
<div class="card-body p-4">
<form method="post" id="rxForm">{% csrf_token %}
  <div class="row g-3 mb-4">
    <div class="col-md-8"><label class="form-label">Patient *</label>{{ form.patient }}</div>
    <div class="col-md-4"><label class="form-label">Notes</label>{{ form.notes }}</div>
  </div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h6 class="mb-0">Prescription Items</h6>
    <button type="button" class="btn btn-sm btn-outline-primary" onclick="addItem()"><i class="bi bi-plus me-1"></i>Add Medicine</button>
  </div>
  <div id="rxItems">
    <div class="rx-item card mb-2 border" id="item_0">
      <div class="card-body py-2 px-3">
        <div class="row g-2 align-items-end">
          <div class="col-md-3"><label class="form-label" style="font-size:12px">Medicine</label>
            <select name="item_medicine_0" class="form-select" style="font-size:13px">
              <option value="">Select...</option>
              {% for m in medicines %}<option value="{{ m.pk }}">{{ m.name }} (UGX {{ m.unit_price|floatformat:0 }})</option>{% endfor %}
            </select>
          </div>
          <div class="col-md-2"><label class="form-label" style="font-size:12px">Dosage</label><input name="item_dosage_0" class="form-control" style="font-size:13px" placeholder="e.g. 500mg"></div>
          <div class="col-md-2"><label class="form-label" style="font-size:12px">Frequency</label><input name="item_frequency_0" class="form-control" style="font-size:13px" placeholder="e.g. 3x daily"></div>
          <div class="col-md-2"><label class="form-label" style="font-size:12px">Duration</label><input name="item_duration_0" class="form-control" style="font-size:13px" placeholder="e.g. 7 days"></div>
          <div class="col-md-1"><label class="form-label" style="font-size:12px">Qty</label><input name="item_quantity_0" type="number" class="form-control" style="font-size:13px" value="1" min="1"></div>
          <div class="col-md-2"><label class="form-label" style="font-size:12px">Instructions</label><input name="item_instructions_0" class="form-control" style="font-size:13px" placeholder="Optional"></div>
        </div>
      </div>
    </div>
  </div>
  <button type="submit" class="btn btn-primary mt-3 me-2"><i class="bi bi-check-lg me-1"></i>Save Prescription</button>
  <a href="{% url 'pharmacy:prescription_list' %}" class="btn btn-outline-secondary mt-3">Cancel</a>
</form>
</div></div>
</div></div>
{% endblock %}
{% block extra_js %}
<script>
let count = 1;
const medicines = [{% for m in medicines %}{ id: {{ m.pk }}, name: "{{ m.name }}", price: {{ m.unit_price }} },{% endfor %}];
function addItem(){
  const tpl = document.getElementById('item_0').outerHTML
    .replace(/_0/g, `_${count}`)
    .replace(/id="item_0"/, `id="item_${count}"`);
  const div = document.createElement('div');
  div.innerHTML = tpl;
  const item = div.firstElementChild;
  item.querySelector('select').value = '';
  item.querySelectorAll('input').forEach(i => { if(i.type==='number') i.value=1; else i.value=''; });
  const removeBtn = document.createElement('button');
  removeBtn.type = 'button'; removeBtn.className = 'btn btn-sm btn-outline-danger mt-2'; removeBtn.textContent = 'Remove';
  removeBtn.onclick = () => item.remove();
  item.querySelector('.card-body').appendChild(removeBtn);
  document.getElementById('rxItems').appendChild(item);
  count++;
}
</script>
{% endblock %}

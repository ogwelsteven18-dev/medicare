{% extends 'base.html' %}
{% block title %}My Profile{% endblock %}
{% block page_title %}My Profile{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-7">
<div class="card">
  <div class="card-header"><i class="bi bi-person-circle me-2"></i>Edit Profile</div>
  <div class="card-body p-4">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-6"><label class="form-label">First Name</label>{{ form.first_name }}</div>
        <div class="col-6"><label class="form-label">Last Name</label>{{ form.last_name }}</div>
        <div class="col-12"><label class="form-label">Email</label>{{ form.email }}</div>
        <div class="col-12"><label class="form-label">Phone</label>{{ form.phone }}</div>
        <div class="col-12"><label class="form-label">Profile Picture</label>{{ form.profile_pic }}</div>
        <div class="col-12"><button type="submit" class="btn btn-primary">Save Changes</button></div>
      </div>
    </form>
  </div>
</div>
</div>
</div>
{% endblock %}
